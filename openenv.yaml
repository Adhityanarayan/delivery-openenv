name: delivery_optimization
version: "1.0.0"
description: >
  Delivery Optimization OpenEnv — courier dispatch on a road graph with
  pickups, dropoffs, vehicle capacity (batching), and delivery deadlines.
  Tasks easy / medium / hard via reset(task_tier=...).

author: adhiawesome

# OpenEnv task manifest for validators.
# `grader` is the HTTP path (same server) returning {"score": ..., "reward": ...} with 0 < score < 1.
tasks:
  - id: easy
    difficulty: easy
    max_steps: 15
    grader: /grade/easy

  - id: medium
    difficulty: medium
    max_steps: 15
    grader: /grade/medium

  - id: hard
    difficulty: hard
    max_steps: 15
    grader: /grade/hard

# Suggested Space: https://huggingface.co/spaces/adhiawesome/delivery-openenv
# Docker CMD in Dockerfile uses $PORT (HF sets this automatically).
